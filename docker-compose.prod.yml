# Produktions-Overlay: manban hinter dem vorhandenen Traefik des Hostinger-Servers.
#
# Aufruf auf dem Server:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Unterschiede zum lokalen Basis-Stack (docker-compose.yml):
#   - manban-api haengt am externen Traefik-Netz "web" und wird ueber Traefik-Labels
#     unter https://kanban.mwolff.org veroeffentlicht (TLS via certresolver "mytlschallenge").
#   - Caddy (lokaler self-signed-Proxy) laeuft NICHT: er ist dem Profil "local-tls"
#     zugeordnet und wird ohne aktives Profil nicht gestartet.
#   - Postgres/MinIO bleiben unveraendert rein intern (keine Host-Ports).
services:
  manban-api:
    environment:
      # Prod-kritische Werte MUESSEN aus der Server-.env kommen (kein unsicherer Default).
      MANBAN_SESSION_SECRET: ${MANBAN_SESSION_SECRET:?MANBAN_SESSION_SECRET muss in .env gesetzt sein}
      MANBAN_BASE_URL: ${MANBAN_BASE_URL:?MANBAN_BASE_URL muss in .env gesetzt sein (z. B. https://kanban.mwolff.org)}
      # Uebrige Prod-Envs (MANBAN_COOKIE_SECURE, MANBAN_BOOTSTRAP_ADMIN_TOKEN, MANBAN_MAIL_*,
      # DB-/MinIO-Zugang) werden vom Basis-Compose aus der .env gelesen.
    networks:
      - default
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.manban.rule=Host(`kanban.mwolff.org`)
      - traefik.http.routers.manban.tls=true
      - traefik.http.routers.manban.entrypoints=web,websecure
      - traefik.http.routers.manban.tls.certresolver=mytlschallenge
      - traefik.http.services.manban.loadbalancer.server.port=8080
      # Security-Header (analog n8n-Stack): HSTS, MIME-Sniffing- und XSS-Schutz.
      - traefik.http.routers.manban.middlewares=manban-sec
      - traefik.http.middlewares.manban-sec.headers.stsSeconds=31536000
      - traefik.http.middlewares.manban-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.manban-sec.headers.stsPreload=true
      - traefik.http.middlewares.manban-sec.headers.forceSTSHeader=true
      - traefik.http.middlewares.manban-sec.headers.contentTypeNosniff=true
      - traefik.http.middlewares.manban-sec.headers.browserXssFilter=true

  # Lokaler TLS-Proxy — in Produktion nicht gestartet (Profil ohne Aktivierung).
  # In Prod uebernimmt Traefik die TLS-Terminierung.
  caddy:
    profiles:
      - local-tls

networks:
  web:
    external: true
