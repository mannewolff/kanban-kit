name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build & test (inkl. gebündeltem Frontend)
        run: mvn -B verify

  # Mutation-Gate (CLAUDE-java.md §5): PIT läuft im Profil -Ppit gegen die Surefire-Unit-Tests
  # (kein Docker/Testcontainers nötig). Eigener Job parallel zum verify-Job — voller Lauf,
  # mutationThreshold=100 bricht bei jedem überlebenden Mutanten.
  mutation:
    name: Backend (PIT Mutation -Ppit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Mutationstests (100% Gate)
        run: mvn -B -Ppit -Dskip.frontend=true test

  frontend:
    name: Frontend (npm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:coverage
