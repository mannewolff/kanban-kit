name: SonarQube Cloud

# Läuft bei jedem Push auf main. Der Release-Flow ist main -> production per PR-Merge
# (siehe RELEASING.md); production hat zum Merge-Zeitpunkt denselben Inhalt wie main, ein
# zusätzlicher Scan dort wäre nur eine redundante Zweitanalyse desselben Commits. Da
# SonarCloud (Free-Tier) ohnehin nur den main-Branch kennt und der Scan dank sonar.branch.name
# immer als main gemeldet wird, bringt die Bindung an production keinen Zusatznutzen mehr —
# nur verzögertes Feedback bis zum nächsten Release. workflow_dispatch bleibt als manueller
# Nachlauf.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube-Analyse (inkl. Coverage) + GitHub-Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # für scripts/sync-sonar-issues-to-github.mjs (gh issue create)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # voller Verlauf nötig, sonst fehlen Sonar die Blame-Infos

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Backend Build + Tests (JaCoCo-Coverage)
        run: mvn -B verify

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend Tests (lcov-Coverage)
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      # Auf Commit-SHA gepinnt statt beweglichem Tag (Supply-Chain-Härtung, siehe
      # CLAUDE-security.md) — entspricht v8.2.0.
      # sonar.branch.name=main explizit gesetzt statt dem Auto-Erkennen des Scanners
      # überlassen: robust auch bei workflow_dispatch (kann von jedem Branch/Ref manuell
      # gestartet werden). Die kostenlose SonarCloud-Stufe kennt ohnehin nur den main-Branch
      # (siehe auch fetchAllIssues in scripts/sync-sonar-issues-to-github.mjs, das ebenfalls
      # den main-Branch ausliest).
      - name: SonarQube-Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dsonar.branch.name=main
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Neue Findings nach GitHub synchronisieren
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-sonar-issues-to-github.mjs
