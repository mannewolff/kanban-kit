# SonarCloud-Konfiguration für kanban-kit.
# projectKey/organization gegen die echte API verifiziert (siehe Issue #112).
sonar.projectKey=mannewolff_kanban-kit
sonar.organization=mannewolff
sonar.projectName=kanban-kit
sonar.host.url=https://sonarcloud.io

# --- Quellcode ---------------------------------------------------------------
# Backend: Maven-Konvention (src/main/java, src/test/java — keine Überschneidung,
# daher keine sonar.test.inclusions nötig). Frontend: Tests liegen neben dem
# Quellcode (*.test.ts(x)), deshalb frontend/src doppelt gelistet + Inclusion-Muster
# zur Unterscheidung.
sonar.sources=src/main/java,frontend/src
sonar.tests=src/test/java,frontend/src
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# db/migration ausgeschlossen: Sonars generischer SQL-Analyzer ist auf PL/SQL/Oracle
# ausgelegt (z. B. VARCHAR2-Regel, die es in Postgres gar nicht gibt) und markiert
# bewusste Full-Reseeds von Seed-Tabellen (DELETE FROM x; ohne WHERE, siehe
# V4__granular_permissions.sql) fälschlich als BLOCKER. Historische Migrationen
# werden ohnehin nicht mehr geändert (Flyway, append-only) — kein Analysewert.
sonar.exclusions=frontend/node_modules/**,frontend/dist/**,frontend/coverage/**,target/**,docs-site/**,src/main/resources/db/migration/**

# --- Java-Analyse --------------------------------------------------------------
# Setzt kompilierte Klassen voraus — vor dem Scan `mvn verify` laufen lassen.
sonar.java.source=25
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
# Dependency-Jars workspace-relativ, da hier bewusst die sonar-scanner-CLI statt des
# sonar-maven-plugin verwendet wird (dieses würde den Klassenpfad automatisch aus dem
# Maven-Build ableiten). Kein `~`: der Scanner expandiert die Tilde nicht (sucht wörtlich
# nach einem Ordner `~`). Der CI-Build füllt target/dependency via
# `dependency:copy-dependencies` (siehe .github/workflows/sonarqube.yml).
sonar.java.libraries=target/dependency/*.jar

# --- Coverage-Reports ----------------------------------------------------------
# Backend: `mvn verify` erzeugt JaCoCo-XML. Frontend: `npm run test:coverage`
# erzeugt lcov (v8-Provider, siehe frontend/vite.config.ts).
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# sonar.coverage.exclusions spiegelt die lokalen Coverage-Ausschlüsse (Backend:
# pom.xml <jacoco-maven-plugin><excludes>, Zeile ~430ff; Frontend: vite.config.ts
# coverage.exclude), damit SonarCloud denselben Mess-Scope wie die lokalen 100%-/
# 87%-Gates sieht. Ohne diesen Abgleich wertet Sonar jede analysierte Datei ohne
# Coverage-Daten als 0% ab — inklusive bewusst ausgeschlossener Klassen (Config-/
# Bean-Wiring, IT-only-Infrastruktur, Design-Tokens) — und die Gesamtzahl fällt
# weit unter den echten lokalen Stand (siehe kanban-kit#215).
#
# Ausschließlich Dateien OHNE Fachlogik, klassen-/dateiweise wie im pom.xml-Vorbild
# (CLAUDE-java.md §5.2) — keine breiten Paketwildcards, die auch abgedeckten Code
# aus der Messung nähmen. Verschachtelte Request-/View-Records innerhalb sonst
# abgedeckter Controller (z. B. CardController$CreateCardRequest) lassen sich per
# Datei-Glob nicht einzeln ausschließen und bleiben bewusst drin (synthetisch,
# kaum "lines to cover").
#
# Diese Liste MUSS synchron zu pom.xml <excludes> und vite.config.ts coverage.exclude
# gehalten werden — bei Änderung dort auch hier nachziehen.
sonar.coverage.exclusions=\
  src/main/java/org/mwolff/manban/ManbanApplication.java,\
  src/main/java/org/mwolff/manban/config/ClockConfig.java,\
  src/main/java/org/mwolff/manban/config/SpaWebConfig.java,\
  src/main/java/org/mwolff/manban/auth/infrastructure/AuthConfig.java,\
  src/main/java/org/mwolff/manban/auth/infrastructure/security/SecurityConfig.java,\
  src/main/java/org/mwolff/manban/attachment/infrastructure/ObjectStorageConfig.java,\
  src/main/java/org/mwolff/manban/auth/web/ForgotPasswordRequest.java,\
  src/main/java/org/mwolff/manban/auth/web/LoginRequest.java,\
  src/main/java/org/mwolff/manban/auth/web/RegisterRequest.java,\
  src/main/java/org/mwolff/manban/auth/web/ResetPasswordRequest.java,\
  src/main/java/org/mwolff/manban/**/infrastructure/persistence/*Entity.java,\
  src/main/java/org/mwolff/manban/**/infrastructure/persistence/*RepositoryAdapter.java,\
  src/main/java/org/mwolff/manban/**/infrastructure/persistence/Jdbc*.java,\
  src/main/java/org/mwolff/manban/**/infrastructure/mail/JavaMail*.java,\
  src/main/java/org/mwolff/manban/attachment/infrastructure/MinioObjectStorage.java,\
  src/main/java/org/mwolff/manban/common/SecureTokens.java,\
  frontend/src/main.tsx,\
  frontend/src/App.tsx,\
  frontend/src/theme.ts,\
  frontend/src/vite-env.d.ts,\
  frontend/src/test/**
