spring:
  application:
    name: manban

  datasource:
    url: ${MANBAN_DB_URL:jdbc:postgresql://localhost:5432/manban}
    username: ${MANBAN_DB_USER:manban}
    password: ${MANBAN_DB_PASSWORD:manban}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # SMTP-Versand (aktiv nur bei manban.mail.enabled=true). Default 587/STARTTLS mit Auth;
  # für 465/SSL bzw. lokale Mailcatcher lassen sich Auth/STARTTLS per Env abschalten.
  mail:
    host: ${MANBAN_SMTP_HOST:localhost}
    port: ${MANBAN_SMTP_PORT:1025}
    username: ${MANBAN_SMTP_USER:}
    password: ${MANBAN_SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${MANBAN_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MANBAN_SMTP_STARTTLS:true}
      mail.smtp.starttls.required: ${MANBAN_SMTP_STARTTLS:true}
      # Versand läuft synchron im Request — harte Timeouts statt hängender Registrierungen.
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

server:
  port: 8080
  forward-headers-strategy: framework  # hinter Caddy (Reverse-Proxy) korrekte Scheme/Host-Auflösung

manban:
  auth:
    base-url: ${MANBAN_BASE_URL:http://localhost:8080}
    verification-ttl: PT24H
    session-secret: ${MANBAN_SESSION_SECRET:dev-only-insecure-secret-change-me}
    session-ttl: P7D
    cookie-secure: ${MANBAN_COOKIE_SECURE:true}
    reset-ttl: PT1H
  mail:
    enabled: ${MANBAN_MAIL_ENABLED:false}
    from: ${MANBAN_MAIL_FROM:no-reply@kanban-kit.local}
    # Sichtbarer Produktname in E-Mail-Betreffs. Interner Codename bleibt "manban" (Property-Ebene),
    # nach außen heißt das Produkt "kanban-kit".
    product-name: ${MANBAN_MAIL_PRODUCT_NAME:kanban-kit}
  project:
    invitation-ttl: P7D
  storage:
    endpoint: ${MANBAN_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MANBAN_MINIO_ACCESS_KEY:manban}
    secret-key: ${MANBAN_MINIO_SECRET_KEY:manban-minio}
    bucket: ${MANBAN_MINIO_BUCKET:manban}
    max-per-card: 20
  cleanup:
    enabled: ${MANBAN_CLEANUP_ENABLED:true}
    done-retention-days: ${MANBAN_DONE_RETENTION_DAYS:30}
    cron: "0 0 * * * *"
  bootstrap:
    # Einmal-Token, um auf einer frischen Instanz den ersten Plattform-Admin zu erzeugen.
    # Leer = deaktiviert. Greift nur, solange kein Admin existiert.
    admin-token: ${MANBAN_BOOTSTRAP_ADMIN_TOKEN:}
